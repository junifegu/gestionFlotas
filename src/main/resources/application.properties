spring.application.name=gestionFlotas
server.port=${PORT:8080}

spring.datasource.url=jdbc:${DATABASE_URL:mysql://localhost:3307/gestionflotas}
spring.datasource.username=${MYSQLUSER:flotauser}
spring.datasource.password=${MYSQLPASSWORD:flotapass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true