<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Conductor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4"> Alta de Conductor</h1>
        <form th:action="@{/altaConductor}" th:object="${conductor}" method="post">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Apellidos</label>
                <input type="text" class="form-control" th:field="*{apellidos}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Nº Licencia</label>
                <input type="text" class="form-control" th:field="*{numeroLicencia}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" class="form-control" th:field="*{fechaNacimiento}" required>
            </div>
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="/inicio" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
