<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Vehículos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4"> Listado de Vehículos </h1>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Matrícula</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>KM Actuales</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="v : ${vehiculos}">
                    <td th:text="${v.id}"></td>
                    <td th:text="${v.matricula}"></td>
                    <td th:text="${v.marca}"></td>
                    <td th:text="${v.modelo}"></td>
                    <td th:text="${v.kmActuales}"></td>
                </tr>
            </tbody>
        </table>
        <a href="/inicio" class="btn btn-secondary">Volver al inicio</a>
        <a href="/altaVehiculo" class="btn btn-warning">Añadir Vehículo</a>
    </div>
</body>
</html>
