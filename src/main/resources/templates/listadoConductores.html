<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Conductores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4"> Listado de Conductores</h1>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Nº Licencia</th>
                    <th>Fecha Nacimiento</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${conductores}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.nombre}"></td>
                    <td th:text="${c.apellidos}"></td>
                    <td th:text="${c.numeroLicencia}"></td>
                    <td th:text="${c.fechaNacimiento}"></td>
                </tr>
            </tbody>
        </table>
        <a href="/inicio" class="btn btn-secondary">Volver al inicio</a>
        <a href="/altaConductor" class="btn btn-success">Añadir Conductor</a>
    </div>
</body>
</html>
