<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Vehículo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4"> Alta de Vehículo</h1>
        <form th:action="@{/altaVehiculo}" th:object="${vehiculo}" method="post">
            <div class="mb-3">
                <label class="form-label">Matrícula</label>
                <input type="text" class="form-control" th:field="*{matricula}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Marca</label>
                <input type="text" class="form-control" th:field="*{marca}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" class="form-control" th:field="*{modelo}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">KM Actuales</label>
                <input type="number" class="form-control" th:field="*{kmActuales}" required>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/inicio" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
